<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#18ffff;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Open book shape -->
  <!-- Left page -->
  <path d="M22 36 L60 42 L60 100 L22 94 Z" fill="url(#page)" opacity="0.95"/>
  <!-- Right page -->
  <path d="M68 42 L106 36 L106 94 L68 100 Z" fill="url(#page)" opacity="0.90"/>
  <!-- Book spine shadow -->
  <path d="M60 42 L64 40 L68 42 L68 100 L64 102 L60 100 Z" fill="#b0bec5" opacity="0.5"/>

  <!-- Text lines on left page -->
  <line x1="28" y1="50" x2="54" y2="53" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="57" x2="54" y2="60" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="64" x2="54" y2="67" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="71" x2="54" y2="74" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="78" x2="44" y2="80" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>

  <!-- Text lines on right page -->
  <line x1="74" y1="53" x2="100" y2="50" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="60" x2="100" y2="57" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="67" x2="100" y2="64" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="74" x2="100" y2="71" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="81" x2="90" y2="79" stroke="#90a4ae" stroke-width="2" stroke-linecap="round"/>

  <!-- X-Ray scan beam (diagonal sweep across the book) -->
  <path d="M16 28 L52 56 L48 62 L12 34 Z" fill="url(#beam)" opacity="0.6"/>
  <path d="M16 28 L112 98 " stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Highlighted entity markers (glowing dots where beam hits text) -->
  <circle cx="38" cy="57" r="4" fill="#00e5ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="82" cy="64" r="4" fill="#00e5ff" opacity="0.9">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="74" r="3.5" fill="#18ffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- "XR" text badge (bottom-right) -->
  <rect x="82" y="88" width="34" height="20" rx="5" ry="5" fill="#00e5ff" opacity="0.85"/>
  <text x="99" y="103" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="14" fill="#0d47a1" text-anchor="middle">X-R</text>
</svg>
